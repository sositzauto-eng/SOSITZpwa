<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.O.S ITZ - Socorro Automotivo</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A60A8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --blue: #0A60A8; --gold: #D4AF37; --bg: #f4f7f6; --red: #dc3545; --green: #28a745; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); margin: 0; color: #333; }
        
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }
        .hidden { display: none !important; }

        /* Estilo dos Cards (Padrão V2.1) */
        .card { background: white; padding: 20px; border-radius: 22px; margin: 15px; border-left: 8px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        .card-pendente { border-left-color: var(--red); }
        .card-execucao { border-left-color: var(--gold); }
        .card-concluido { border-left-color: var(--green); }
        
        .btn-primary { background: var(--blue); color:white; border:none; padding:16px; border-radius:12px; font-weight:700; width:100%; cursor:pointer; font-size: 15px; }
        .btn-google { background:white; color:#444; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; gap:10px; margin-top: 10px; }
        
        header { background: white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo-nav { height: 35px; }

        /* Grade de Serviços */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .service-item { background: white; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .service-item i { font-size: 35px; color: var(--blue); margin-bottom: 8px; }
        
        #map { height: 180px; width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #ddd; }
        .mini-map { height: 130px; border-radius: 12px; margin-top: 10px; z-index: 1; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:flex-end; }
        .modal-content { background:white; width:100%; border-radius:30px 30px 0 0; padding:25px; max-height: 90vh; overflow-y: auto; }
        
        input, textarea, select { padding:14px; border-radius:12px; border:1px solid #ddd; width:100%; margin-bottom: 12px; font-size: 15px; }

        .nexora-footer { text-align: center; font-size: 9px; color: var(--blue); padding: 20px; text-transform: uppercase; font-weight: bold; opacity: 0.6; }
    </style>
</head>
<body>

    <section id="screen-auth" class="screen active" style="justify-content: center; align-items: center; padding: 20px;">
        <div style="width:100%; max-width: 380px; text-align: center; background: white; padding: 40px 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <img src="logo.png" style="width:130px; margin-bottom:10px;">
            <h2 style="color: var(--blue); margin: 0;">S.O.S ITZ</h2>
            <p style="color: var(--gold); font-size: 11px; font-weight:700; margin-bottom:25px;">SOCORRO AUTOMOTIVO</p>
            
            <input type="email" id="emailAuth" placeholder="Seu E-mail">
            <input type="password" id="senhaAuth" placeholder="Sua Senha">
            <button onclick="handleAuth()" id="btnAcaoAuth" class="btn-primary">ENTRAR</button>
            <button onclick="loginGoogle()" class="btn-primary btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar com Google
            </button>
            <p onclick="toggleModoAuth()" id="toggleAuth" style="cursor:pointer; color: var(--blue); font-weight:700; margin-top:25px; font-size:14px;">Criar nova conta</p>
        </div>
        <div class="nexora-footer">Desenvolvido por Nexora AI</div>
    </section>

    <section id="screen-app" class="screen">
        <header>
            <img src="logo.png" class="logo-nav">
            <div style="display: flex; gap: 15px; align-items: center;">
                <i id="btnAdmin" class='bx bx-cog hidden' style="font-size:24px; color: var(--blue); cursor:pointer;" onclick="abrirAdmin()"></i>
                <i class='bx bx-log-out' style="font-size:24px; color: #999; cursor:pointer;" onclick="sair()"></i>
            </div>
        </header>

        <main style="flex: 1;">
            <div id="welcomeArea" style="padding: 20px 20px 0 20px;">
                <h3 id="txtBoasVindas" style="margin: 0;">Olá!</h3>
                <p id="txtRole" style="font-size: 14px; color: #666; margin-top: 5px;">Como podemos ajudar seu veículo?</p>
            </div>

            <div id="gridServicos" class="services-grid">
                <div class="service-item" onclick="abrirModal('Guincho')"><i class='bx bxs-truck'></i><p>Guincho</p></div>
                <div class="service-item" onclick="abrirModal('Mecânico')"><i class='bx bxs-wrench'></i><p>Mecânico</p></div>
                <div class="service-item" onclick="abrirModal('Bateria')"><i class='bx bxs-bolt'></i><p>Bateria</p></div>
                <div class="service-item" onclick="abrirModal('Pneu Furado')"><i class='bx bxs-car-crash'></i><p>Pneu</p></div>
            </div>

            <div id="feedChamados"></div>
        </main>
        
        <div class="nexora-footer">Desenvolvido por Nexora AI</div>
    </section>

    <div id="modalPedido" class="modal">
        <div class="modal-content">
            <h3 id="modalTitulo" style="color:var(--blue); margin-top: 0;">Solicitar Ajuda</h3>
            <input type="text" id="veiculo" placeholder="Marca e Modelo (Ex: Gol G5)">
            <input type="text" id="cor" placeholder="Cor do veículo">
            <input type="text" id="endereco" placeholder="Endereço aproximado">
            <textarea id="problema" placeholder="Ponto de referência ou detalhes do problema..." rows="3"></textarea>
            <div id="map"></div>
            <button onclick="enviarPedido()" class="btn-primary" style="background:var(--gold); margin-top:15px;">PUBLICAR CHAMADO</button>
            <button onclick="fecharModal()" style="width:100%; border:none; background:none; color:#999; margin-top:10px; font-weight: bold;">Cancelar</button>
        </div>
    </div>

    <div id="modalAdmin" class="modal">
        <div class="modal-content" style="height: 70vh;">
            <h3 style="color:var(--blue);">Gestão de Usuários</h3>
            <div id="listaUsuarios"></div>
            <button onclick="document.getElementById('modalAdmin').style.display='none'" class="btn-primary" style="margin-top: 20px;">FECHAR</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, where, updateDoc, deleteDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcThtAGaLFpObMWZKpnlS3NZwb1YOWC00",
            authDomain: "sosweb-85603.firebaseapp.com",
            projectId: "sosweb-85603",
            storageBucket: "sosweb-85603.firebasestorage.app",
            messagingSenderId: "493039677510",
            appId: "1:493039677510:web:851cb36b68b6203650da47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let meuCargo = "cliente", servicoSel = "", map, marker, totalChamadosAntigo = -1;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const email = user.email.toLowerCase();
                const userRef = doc(db, "usuarios", user.uid);
                const snap = await getDoc(userRef);

                if (email === "admin1@gmail.com") meuCargo = "admin";
                else if (email === "ilker@gmail.com") meuCargo = "oficial";
                else meuCargo = snap.exists() ? snap.data().role : "cliente";

                await setDoc(userRef, { email, role: meuCargo }, { merge: true });

                configurarUI(user);
                carregarFeed();
            } else {
                document.getElementById('screen-auth').classList.add('active');
                document.getElementById('screen-app').classList.remove('active');
            }
        });

        function configurarUI(user) {
            document.getElementById('screen-auth').classList.remove('active');
            document.getElementById('screen-app').classList.add('active');
            
            const nome = user.displayName ? user.displayName.split(' ')[0] : user.email.split('@')[0];
            document.getElementById('txtBoasVindas').innerText = `Olá, ${nome}!`;
            
            const eGestor = meuCargo === "admin" || meuCargo === "oficial";
            document.getElementById('btnAdmin').classList.toggle('hidden', meuCargo !== "admin");
            document.getElementById('gridServicos').classList.toggle('hidden', eGestor);
            document.getElementById('txtRole').innerText = eGestor ? "Painel de Controle Oficina" : "Como podemos ajudar seu veículo?";
        }

        function carregarFeed() {
            const colRef = collection(db, "chamados");
            const q = (meuCargo === "admin" || meuCargo === "oficial") 
                ? query(colRef, orderBy("data", "desc"))
                : query(colRef, where("uid", "==", auth.currentUser.uid), orderBy("data", "desc"));

            onSnapshot(q, (snap) => {
                // Notificação Simples
                if (totalChamadosAntigo !== -1 && snap.size > totalChamadosAntigo && meuCargo !== "cliente") {
                    alert("🔔 Novo chamado recebido!");
                }
                totalChamadosAntigo = snap.size;

                const container = document.getElementById('feedChamados');
                container.innerHTML = `<h3 style="margin: 20px 20px 10px 20px; font-size: 16px; color: var(--blue);">${meuCargo === 'cliente' ? 'Meus Chamados' : 'Ocorrências em Aberto'}</h3>`;

                snap.forEach(d => {
                    const c = d.data();
                    const card = document.createElement('div');
                    card.className = `card card-${c.status}`;
                    
                    // Lógica para o Mecânico ESCOLHER o status
                    let controleStatus = "";
                    if (meuCargo !== "cliente") {
                        controleStatus = `
                            <div style="margin-top:15px;">
                                <label style="font-size:11px; font-weight:bold; color:#999;">ALTERAR STATUS:</label>
                                <select onchange="mudarStatus('${d.id}', this.value)" style="margin-top:5px; background:#f9f9f9;">
                                    <option value="pendente" ${c.status==='pendente'?'selected':''}>Pendente (Vermelho)</option>
                                    <option value="execucao" ${c.status==='execucao'?'selected':''}>Em Execução (Amarelo)</option>
                                    <option value="concluido" ${c.status==='concluido'?'selected':''}>Concluído (Verde)</option>
                                </select>
                            </div>
                        `;
                    }

                    const lixeira = meuCargo === "admin" ? `<i class='bx bx-trash' style="position:absolute; right:20px; top:20px; color:var(--red); cursor:pointer;" onclick="apagar('${d.id}')"></i>` : "";

                    card.innerHTML = `
                        ${lixeira}
                        <b style="color:var(--blue); text-transform:uppercase; font-size:12px;">${c.servico}</b>
                        <h4 style="margin: 5px 0;">${c.veiculo} - ${c.cor}</h4>
                        <p style="font-size:13px; color:#666; margin-bottom:5px;"><i class='bx bx-map-pin'></i> ${c.endereco}</p>
                        <p style="font-size:12px; color:#888; background:#f4f7f6; padding:8px; border-radius:8px;">${c.problema || 'Sem detalhes'}</p>
                        <div id="map-${d.id}" class="mini-map"></div>
                        ${controleStatus}
                    `;
                    container.appendChild(card);

                    setTimeout(() => {
                        const mm = L.map(`map-${d.id}`, {zoomControl:false, attributionControl:false}).setView([c.lat, c.lng], 15);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mm);
                        L.marker([c.lat, c.lng]).addTo(mm);
                    }, 600);
                });
            });
        }

        // --- FUNÇÕES GLOBAIS ---
        window.mudarStatus = (id, novo) => updateDoc(doc(db, "chamados", id), { status: novo });
        window.apagar = (id) => confirm("Excluir definitivamente?") && deleteDoc(doc(db, "chamados", id));
        
        window.handleAuth = async () => {
            const e = document.getElementById('emailAuth').value, s = document.getElementById('senhaAuth').value;
            const isCad = document.getElementById('btnAcaoAuth').innerText === "CADASTRAR";
            try {
                if(isCad) await createUserWithEmailAndPassword(auth, e, s);
                else await signInWithEmailAndPassword(auth, e, s);
            } catch (err) { alert("Atenção: " + err.message); }
        };

        window.loginGoogle = () => signInWithPopup(auth, provider).catch(err => alert(err.message));
        
        window.toggleModoAuth = () => {
            const btn = document.getElementById('btnAcaoAuth');
            const link = document.getElementById('toggleAuth');
            btn.innerText = btn.innerText === "ENTRAR" ? "CADASTRAR" : "ENTRAR";
            link.innerText = btn.innerText === "ENTRAR" ? "Criar nova conta" : "Já tenho uma conta";
        };

        window.abrirModal = (t) => {
            servicoSel = t;
            document.getElementById('modalTitulo').innerText = `Solicitar ${t}`;
            document.getElementById('modalPedido').style.display = 'flex';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                if(!map) {
                    map = L.map('map').setView([lat, lng], 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    marker = L.marker([lat, lng], {draggable: true}).addTo(map);
                } else { map.setView([lat, lng], 16); marker.setLatLng([lat, lng]); }
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                document.getElementById('endereco').value = data.display_name.split(',').slice(0,3).join(',');
            });
        };

        window.enviarPedido = async () => {
            const v = document.getElementById('veiculo').value;
            if(!v) return alert("Por favor, informe o veículo!");
            await addDoc(collection(db, "chamados"), {
                uid: auth.currentUser.uid,
                servico: servicoSel,
                veiculo: v,
                cor: document.getElementById('cor').value,
                endereco: document.getElementById('endereco').value,
                problema: document.getElementById('problema').value,
                lat: marker.getLatLng().lat,
                lng: marker.getLatLng().lng,
                status: "pendente",
                data: serverTimestamp()
            });
            fecharModal();
        };

        window.fecharModal = () => document.getElementById('modalPedido').style.display = 'none';
        window.sair = () => signOut(auth);

        window.abrirAdmin = async () => {
            document.getElementById('modalAdmin').style.display = 'flex';
            onSnapshot(collection(db, "usuarios"), (snap) => {
                const list = document.getElementById('listaUsuarios');
                list.innerHTML = "";
                snap.forEach(u => {
                    const d = u.data();
                    if(d.email === "admin1@gmail.com") return;
                    list.innerHTML += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;">
                            <span style="font-size:12px;">${d.email}</span>
                            <select onchange="mudarCargo('${u.id}', this.value)" style="width:auto; margin:0; padding:5px; font-size:11px;">
                                <option value="cliente" ${d.role==='cliente'?'selected':''}>Cliente</option>
                                <option value="oficial" ${d.role==='oficial'?'selected':''}>Oficina</option>
                            </select>
                        </div>`;
                });
            });
        };

        window.mudarCargo = (id, role) => updateDoc(doc(db, "usuarios", id), { role });
    </script>
</body>
</html>
